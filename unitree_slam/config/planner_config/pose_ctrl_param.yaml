# =============================================================================
# 控制层 PID 参数. 跟 planner_config/param.yaml 配套: planner 给出"下一刻应该
# 在哪", 这里的 PID 把它转成 (vx, vy, vyaw) 命令送给 SportClient::Move.
#
# 字段速查 (每个机器人段同名):
#   ctrl_rate              控制频率 (Hz). 50/100 取决于机器人计算能力.
#   PID_x/y/yaw_KP/KI/KD   x / y / yaw 三轴的 PID 增益. 调大 KP 跟得紧但抖,
#                          调大 KI 消除稳态误差但易超调, KD 默认 0 防噪声.
#   PID_x/y/yaw_Vmax       三轴速度上限 (m/s 或 rad/s). 急停安全网.
#   PID_x/y/yaw_Limmax     PID 输出抗 windup 上限. 防止积分项无限增长.
#   threshold_x/y          位置误差容忍 (m), 小于此停在原地不再修正.
#   threshold_yaw          姿态误差容忍 (rad).
#
# 调参规律: 先调 KP 让响应有, 再加 KI 消静差, 最后 KD 抑振 (一般留 0).
# 改任何 PID 增益超过 ±30% 都属于 AGENTS.md §7.3 P1 范围, 需硬件回归.
# =============================================================================

B2:
  pid:
    ctrl_rate: 50 #hz

    # x方向
    PID_x_Limmax: 0.2
    PID_x_Vmax: 1.8
    PID_x_KP: 2.5
    PID_x_KI: 0.1
    PID_x_KD: 0.0

    # y方向
    PID_y_Limmax: 0.2
    PID_y_Vmax: 0.7
    PID_y_KP: 3.5
    PID_y_KI: 0.1
    PID_y_KD: 0.0
    # yaw
    PID_yaw_Limmax: 0.2
    PID_yaw_Vmax: 0.8
    PID_yaw_KP: 2.5
    PID_yaw_KI: 0.1
    PID_yaw_KD: 0.0

    # about threshold
    # x方向
    threshold_x: 0.02
    # y方向
    threshold_y: 0.02
    # yaw
    threshold_yaw: 0.02

  ctrl:
    CurvatureSamplingInterval: 0.2                               # 曲率离散点采样间隔   pid 巡迹使用
    # Planner 参数设置
    Planner/pub_rate: 40.0                                     # 节点发布频率
    Planner/forwardDis: 0.60 # 0.6                                     # 搜索的最佳追踪点到当前位置的最远距离
    Planner/transform_tolerance: 0.3                           # 是否到达目标附近的容忍度

    accurateThresholdRotate_x: 0.1
    accurateThresholdRotate_y: 0.1
    accurateThresholdRotate_yaw: 0.15

    accurateThresholdAdjust_x: 0.08
    accurateThresholdAdjust_y: 0.08
    accurateThresholdAdjust_yaw: 0.1

    accurateThresholdKeeping_x: 0.05
    accurateThresholdKeeping_y: 0.05
    accurateThresholdKeeping_yaw: 0.15


