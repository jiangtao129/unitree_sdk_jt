# =============================================================================
# Mid360 LiDAR re-localization (重定位) config. Most fields share semantics with
# pl_mapping/mid360.yaml — see Go2_W there for detailed Chinese annotation. The
# only relocation-specific fields are:
#   - pub_global_pcd_topic / pub_local_pcd_topic: 重定位时把全局 PCD 和当前
#     局部子图各发一份, 给可视化 (rviz2) 用
#   - icp_score:           ICP 拟合通过阈值; 越小越严, 越大越宽容 (易 mismatch)
#   - speed_max:           重定位过程允许的最大平动速度 (m/s); 超过则停下来
#                          等点云稳定下来再算 ICP, 避免速度大导致 ICP 跑飞
#   - det_range:           重定位时仅看 LiDAR 周围 ±det_range 米的点 (默认 10m,
#                          比 mapping 的 60m 小很多 — 重定位只需要近距离特征
#                          来对齐, 远端噪点反而 hurt)
# =============================================================================
G1:
  imu_topic: "rt/utlidar/imu_livox_mid360"   # IMU 话题
  lidar_topic: "rt/utlidar/cloud_livox_mid360"   # LiDAR 话题
  map_frame: "map"
  body_frame: "livox_frame"
  pub_point_topic: "rt/unitree/slam_relocation/points"
  pub_odom_topic: "rt/unitree/slam_relocation/odom"
  pub_global_pcd_topic: "rt/unitree/slam_relocation/global_map"
  pub_local_pcd_topic: "rt/unitree/slam_relocation/local_map"
  imu_acc_multi: 1.0 #10.0
  imu_gyro_multi: 1.0
  filter_num: 9 #
  lidar_scan_min_range: 0.25
  lidar_scan_max_range: 20.0          # 30.0
  imu_init_num: 100
  vel_cov: 20.0
  acc_cov: 50000.0
  gyro_cov: 1000.0
  b_acc_cov: 0.0001
  b_gyro_cov: 0.0001
  lidar_meas_cov_inv: 100.0
  imu_meas_acc_cov_inv: 1.0
  imu_meas_gyro_cov_inv: 10.0
  satu_acc: 20.0
  satu_gyro: 35.0
  scan_resolution: 0.3 #0.15
  map_resolution: 0.3
  near_search_num: 5.0
  move_thresh: 1.5
  det_range: 10.0
  pose_imu_lidar: [1.0, 0.0, 0.0, 0.0, -0.011, -0.02329, 0.04412] # [qw,qx,qy,qz,tx,ty,tz ]
  icp_score: 0.03
  cube_len: 300.0
  speed_max: 1.5 #m/s
  plane_threshold: 0.1 #0.1
  dist_sq_threshold: 1.5 #0.1
  init_local_map_res: 0.15
  gridResolutionX: 30
  gridResolutionY: 30
  gridResolutionZ: 30
  nearbyMethod: NEARBY26
  re_position_tollerance: 0.1
  re_angle_tollerance: 0.2
  re_score_tollerance: 0.02
  map_thresh: 10.0
  time_thresh: 1.0
  pos_thresh: 0.5
  angle_thresh: 0.2
  ground_ang: 70.0     # degree

