name: C/C++ Build Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel an in-flight run when the same PR (or branch) gets a new push.
# Saves CI minutes and keeps the latest commit's status as the source of
# truth for branch-protection's "build" required check.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only reads the repo (checkout) and runs
# build/test commands. It does NOT push, comment, or touch issues/PRs.
# Lock down the GITHUB_TOKEN to read-only contents so a hypothetical
# compromised action in the dependency graph cannot mutate the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest  # Use latest runner to host the container
    timeout-minutes: 15     # Hard cap so a stuck apt mirror or hung cmake
                            # doesn't pin the runner forever (default is 360).

    container:
      image: ubuntu:20.04
      options: --privileged  # Needed for some build tools

    steps:
    - uses: actions/checkout@v5
    
    - name: Install dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y cmake g++ build-essential libyaml-cpp-dev libeigen3-dev python3 python3-pip
        
    - name: CMake build
      run: |
        cmake -Bbuild
        cmake --build build -j$(nproc)

    - name: Run unified verify (build + python smoke)
      # scripts/verify.sh 是仓库唯一真相验证入口; 第 1 段会复用上面已编好的 build/,
      # 第 2 段跑 view_map.py --selftest, 缺 python deps 时优雅 skip.
      run: bash ./scripts/verify.sh